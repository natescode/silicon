name: Bench

# Opt into Node 24 for JS actions ahead of the 2026-06-16 forced cutoff
# (actions/checkout, upload-artifact, configure-pages still ship Node 20).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  pull_request:
    paths:
      - 'compiler/src/**'
      - 'compiler/scripts/bench.ts'
      - 'compiler/scripts/bench-gen.ts'
      - 'compiler/tests/bench/**'
      - '.github/workflows/bench.yml'
  push:
    branches: [main]

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Run bench (current branch)
        working-directory: compiler
        run: |
          bun run scripts/bench.ts --json > bench-current.json
          cat bench-current.json

      - name: Run bench (base branch)
        if: github.event_name == 'pull_request'
        working-directory: compiler
        run: |
          # Stash current results.
          mv bench-current.json /tmp/bench-current.json
          # Pathspecs are relative to this step's working-directory (compiler/).
          git checkout ${{ github.event.pull_request.base.sha }} -- src scripts tests/bench
          bun run scripts/bench.ts --json > bench-base.json || true
          mv /tmp/bench-current.json bench-current.json
          git checkout ${{ github.sha }} -- src scripts tests/bench

      - name: Compare
        if: github.event_name == 'pull_request'
        working-directory: compiler
        run: |
          if [ ! -s bench-base.json ]; then
            echo "No baseline to compare against — first run on this branch."
            exit 0
          fi
          bun run scripts/bench-compare.ts bench-base.json bench-current.json

      - name: Upload bench results
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          # upload-artifact paths are relative to the repo root, not the step cwd.
          path: compiler/bench-current.json
          retention-days: 30
