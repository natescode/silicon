name: Docs site

# Opt into Node 24 for JS actions ahead of the 2026-06-16 forced cutoff
# (actions/checkout, upload-artifact, configure-pages still ship Node 20).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'compiler/etc/sigil.api.md'
      - 'website/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Sync docs from repo
        run: bun run sync

      - name: Build
        env:
          SILICON_DOCS_BASE: /sigil/
        run: bun run build

      - uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages (Actions source) so the run doesn't fail with
          # "Get Pages site failed" when Pages isn't yet enabled in Settings.
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          # Artifact paths are relative to the repo root, not the job cwd.
          path: website/src/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
