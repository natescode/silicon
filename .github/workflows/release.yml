name: Release

# Opt into Node 24 for JS actions ahead of the 2026-06-16 forced cutoff
# (actions/checkout, upload-artifact, configure-pages still ship Node 20).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ── Build native sgl binaries for every Tier 1 platform ─────────────────
  #
  # `bun build --compile` cross-compiles to every target triple from a single
  # host, so all four binaries are produced on one always-available
  # ubuntu-latest runner.  This replaces the previous per-OS-runner model,
  # which broke when GitHub retired the Intel macOS `macos-13` runner: the
  # `build-macos-x64` job sat "awaiting a runner" for 24h and never ran, so the
  # dependent `release` job never published (the v0.1.1 release failure).

  build:
    name: Build — all Tier 1 platforms (cross-compiled)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile

      - name: Build sgl binaries
        run: |
          # build-binary.ts inlines the compiler's built-in assets (strata /
          # std.wat / modules) and tracks the CLI entry point under cli/.  Given
          # explicit platform args it emits cli/dist/sgl-<platform> for each
          # target triple via `bun build --compile --target=...`.
          bun run cli/scripts/build-binary.ts \
            linux-x86_64 linux-aarch64 macos-x86_64 macos-aarch64

      - name: Smoke test (native linux-x86_64)
        run: |
          # The host-native binary validates the bundle + compile path; the
          # other three are the same bundle cross-targeted.
          echo '@fn main := 0;' > /tmp/smoke.si
          ./cli/dist/sgl-linux-x86_64 check /tmp/smoke.si

      - name: Package tarballs
        run: |
          VERSION="${GITHUB_REF_NAME}"
          for PLATFORM in linux-x86_64 linux-aarch64 macos-x86_64 macos-aarch64; do
            DIST="sgl-${VERSION}-${PLATFORM}"
            mkdir -p "${DIST}"
            cp "cli/dist/sgl-${PLATFORM}" "${DIST}/sgl"
            cp README.md LICENSE "${DIST}/" 2>/dev/null || true
            tar czf "${DIST}.tar.gz" "${DIST}/"
            sha256sum "${DIST}.tar.gz" > "${DIST}.tar.gz.sha256"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: sgl-binaries
          path: sgl-*.tar.gz*
          retention-days: 1

  # ── Publish GitHub Release with all tarballs ─────────────────────────────

  release:
    name: Publish GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Silicon ${{ github.ref_name }}"
          body: |
            ## Silicon ${{ github.ref_name }}

            ### Installation

            **curl | sh (recommended):**
            ```sh
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | sh
            ```

            **Manual:** download the tarball for your platform below, extract, and place `sgl` on your PATH.

            ### Tier 1 platforms

            | Platform | Tarball |
            |---|---|
            | Linux x86-64 | `sgl-${{ github.ref_name }}-linux-x86_64.tar.gz` |
            | Linux ARM64 | `sgl-${{ github.ref_name }}-linux-aarch64.tar.gz` |
            | macOS ARM64 (Apple Silicon) | `sgl-${{ github.ref_name }}-macos-aarch64.tar.gz` |
            | macOS x86-64 | `sgl-${{ github.ref_name }}-macos-x86_64.tar.gz` |

            ### Checksums

            SHA-256 checksums are in the corresponding `.sha256` files.

            ### Changelog

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
