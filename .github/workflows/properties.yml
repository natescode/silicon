name: Property Tests

# Opt into Node 24 for JS actions ahead of the 2026-06-16 forced cutoff
# (actions/checkout, upload-artifact, configure-pages still ship Node 20).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  properties:
    name: Property suite
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # 60-second budget per property is enforced inside the test runner via
      # `--timeout 60000`. The job-level timeout-minutes above is the outer
      # safety net for the whole suite (parser load + lockfile resolution
      # dominate, so 10 minutes is plenty).
      - name: Run property tests
        working-directory: compiler
        run: bun run test:properties
