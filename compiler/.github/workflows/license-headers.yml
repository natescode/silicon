name: License headers

on:
  pull_request:
    paths:
      - 'src/**/*.ts'
      - 'src/strata/**/*.si'
      - 'src/stdlib/**/*.si'
  push:
    branches: [main]

jobs:
  spdx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SPDX headers
        shell: bash
        run: |
          set -euo pipefail
          missing=()

          # TypeScript: every src/**/*.ts must carry `// SPDX-License-Identifier: MIT`
          # within the first two lines (line 2 if line 1 is a shebang).
          while IFS= read -r f; do
            if ! head -2 "$f" | grep -q '^// SPDX-License-Identifier: MIT$'; then
              missing+=("$f")
            fi
          done < <(find src -type f -name '*.ts')

          # Silicon strata + stdlib: every src/strata/**/*.si, src/stdlib/**/*.si
          # must start with `# SPDX-License-Identifier: MIT`
          while IFS= read -r f; do
            if ! head -1 "$f" | grep -q '^# SPDX-License-Identifier: MIT$'; then
              missing+=("$f")
            fi
          done < <(find src/strata src/stdlib -type f -name '*.si')

          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing SPDX-License-Identifier header in ${#missing[@]} file(s):"
            for f in "${missing[@]}"; do
              echo "  $f"
            done
            exit 1
          fi

          echo "All files have SPDX headers."
