name: Parser Fuzz

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly extended run.  Uses an env override to bump per-target budgets.
    - cron: '17 3 * * *'

jobs:
  fuzz:
    name: Fuzz suite
    runs-on: ubuntu-latest
    timeout-minutes: ${{ github.event_name == 'schedule' && 35 || 10 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run fuzz suite (PR / push — 60s per target)
        if: github.event_name != 'schedule'
        run: bun run test:fuzz

      - name: Run fuzz suite (nightly — 30 min per target)
        if: github.event_name == 'schedule'
        env:
          SIGIL_FUZZ_BUDGET_MS: '5400000'  # 90 min total ÷ 3 targets = 30 min each
          SIGIL_FUZZ_BYTES_RUNS: '1000000'
          SIGIL_FUZZ_TOKEN_RUNS: '1000000'
          SIGIL_FUZZ_ROUNDTRIP_RUNS: '500000'
        run: bun test --timeout 6000000 tests/fuzz
