<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sigil Playground</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d1117;
  --surface:   #161b22;
  --surface2:  #21262d;
  --border:    #30363d;
  --text:      #e6edf3;
  --muted:     #8b949e;
  --accent:    #a371f7;
  --accent2:   #7c3aed;
  --blue:      #58a6ff;
  --green:     #3fb950;
  --red:       #f85149;
  --yellow:    #d29922;
  --mono:      'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
  --error-bg:    #2d1117;
  --wat-kw:      #ff7b72;
  --wat-fn:      #58a6ff;
  --wat-num:     #79c0ff;
  --wat-comment: #484f58;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 14px; }

/* ── Header ────────────────────────────────────────────────────────────── */
header {
  display: flex; align-items: center; gap: 16px;
  padding: 0 20px; height: 48px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.logo { font-size: 1rem; font-weight: 700; color: var(--accent); letter-spacing: 0.04em; user-select: none; }
.logo span { color: var(--muted); font-weight: 400; font-size: 0.85rem; margin-left: 6px; }

.header-actions { display: flex; gap: 8px; margin-left: auto; align-items: center; }

#example-select, #theme-select {
  background: var(--surface2); color: var(--text);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 5px 10px; font-size: 0.82rem;
  cursor: pointer; outline: none;
}
#example-select { max-width: 200px; }
#theme-select   { max-width: 160px; }
#example-select:hover, #theme-select:hover { border-color: var(--accent); }
#example-select option, #theme-select option { background: var(--surface2); }

button {
  cursor: pointer; border: none; border-radius: 6px; font-size: 0.82rem; font-weight: 500;
  padding: 6px 14px; transition: opacity 0.15s, background 0.15s;
}
button:hover { opacity: 0.85; }
button:active { opacity: 0.7; }
button:disabled { opacity: 0.4; cursor: not-allowed; }

#btn-compile {
  background: var(--accent); color: #fff; padding: 7px 18px; font-size: 0.88rem;
}
#btn-clear-console {
  background: var(--surface2); color: var(--muted); border: 1px solid var(--border);
}

.status-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0;
}
.status-dot.ok  { background: var(--green); }
.status-dot.err { background: var(--red); }
.status-dot.busy { background: var(--yellow); animation: pulse 1s infinite; }

@keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.3 } }

/* ── Main layout ───────────────────────────────────────────────────────── */
.layout {
  display: flex; flex-direction: column;
  height: calc(100vh - 48px);
}

/* Top half: editor panes */
.editors {
  display: grid; grid-template-columns: 1fr 1fr;
  flex: 1 1 0; min-height: 0;
  border-bottom: 1px solid var(--border);
}

.pane {
  display: flex; flex-direction: column; min-height: 0;
  border-right: 1px solid var(--border);
}
.pane:last-child { border-right: none; }

.pane-header {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
  font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em;
}
.pane-header .lang-badge {
  background: var(--accent2); color: #fff; padding: 1px 7px; border-radius: 3px;
  font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase;
}

/* ── CodeMirror editor container ─────────────────────────────────────── */
#editor {
  flex: 1; min-height: 0; overflow: hidden;
  display: flex; flex-direction: column;
}
#editor .cm-editor {
  flex: 1; min-height: 0;
  font-family: var(--mono); font-size: 0.85rem;
}
#editor .cm-scroller {
  flex: 1 !important; overflow: auto !important; min-height: 0 !important;
}

#wat-output {
  flex: 1; overflow: auto; background: var(--bg);
  font-family: var(--mono); font-size: 0.82rem; line-height: 1.6;
  padding: 14px 16px; color: var(--muted); white-space: pre;
}
#wat-output .kw      { color: var(--wat-kw); }
#wat-output .fn      { color: var(--wat-fn); }
#wat-output .num     { color: var(--wat-num); }
#wat-output .comment { color: var(--wat-comment); }

/* ── Bottom section ─────────────────────────────────────────────────────── */
.bottom {
  display: flex; flex-direction: column; flex-shrink: 0;
  max-height: 45vh; min-height: 160px;
}

/* Exports panel */
#exports-panel {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 10px 16px; overflow-y: auto; max-height: 180px;
}
#exports-panel:empty { display: none; }

.exports-label {
  font-size: 0.72rem; color: var(--muted); text-transform: uppercase;
  letter-spacing: 0.06em; margin-bottom: 8px;
}

.export-row {
  display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
  padding: 6px 0; border-bottom: 1px solid var(--border);
}
.export-row:last-child { border-bottom: none; }

.fn-sig {
  font-family: var(--mono); font-size: 0.82rem; color: var(--blue);
  min-width: 200px;
}

.param-wrap { display: flex; gap: 6px; flex-wrap: wrap; }

.param-field {
  display: flex; flex-direction: column; gap: 2px;
}
.param-label {
  font-size: 0.68rem; color: var(--muted); font-family: var(--mono);
}
.param-field input {
  background: var(--bg); color: var(--text); border: 1px solid var(--border);
  border-radius: 4px; padding: 4px 8px; font-family: var(--mono); font-size: 0.82rem;
  width: 90px; outline: none;
}
.param-field input:focus { border-color: var(--accent); }

.btn-call {
  background: var(--surface2); color: var(--green);
  border: 1px solid var(--border); padding: 5px 12px; font-size: 0.8rem;
}
.btn-call:hover { background: var(--green); color: #000; border-color: var(--green); }

.call-result {
  font-family: var(--mono); font-size: 0.82rem; color: var(--green); margin-left: 4px;
}

/* Error banner */
#error-banner {
  background: var(--error-bg); border: 1px solid var(--red); border-radius: 6px;
  padding: 10px 14px; margin: 8px 16px 0;
  font-family: var(--mono); font-size: 0.8rem; color: var(--red);
  white-space: pre-wrap; display: none;
}

/* Console */
.console-header {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px; background: var(--surface);
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em;
}

#console {
  flex: 1; overflow-y: auto; background: var(--bg);
  font-family: var(--mono); font-size: 0.82rem; line-height: 1.7;
  padding: 10px 16px; color: var(--text);
}

.console-line { display: flex; gap: 8px; }
.console-line .prefix { color: var(--accent); user-select: none; }
.console-line .msg    { color: var(--text); }
.console-line.print .prefix { color: var(--muted); }
.console-line.print .msg    { color: var(--muted); }
.console-line.err   .msg    { color: var(--red); }
.console-line.result .msg   { color: var(--green); }

.console-empty { color: var(--border); font-style: italic; padding: 4px 0; }
</style>
</head>
<body>

<header>
  <div class="logo">⬡ Sigil <span>Playground</span></div>
  <select id="example-select">
    <option value="" disabled selected>— Examples —</option>
    <option value="empty">Empty</option>
    <option value="hello_world">Hello World</option>
    <option value="hypotenuse">Hypotenuse</option>
    <option value="fibonacci">Fibonacci</option>
    <option value="factorial">Factorial</option>
    <option value="safe_divide">Safe Divide</option>
    <option value="countdown">Countdown</option>
    <option value="color_match">Color Match</option>
    <option value="bitwise">Bitwise Ops</option>
    <option value="math_sampler">Math Sampler</option>
  </select>
  <select id="theme-select">
    <option value="sigil-dark" selected>Sigil Dark</option>
    <option value="vscode-dark">VSCode Dark</option>
    <option value="github-light">GitHub Light</option>
  </select>
  <div class="header-actions">
    <div class="status-dot" id="status-dot"></div>
    <button id="btn-clear-console">Clear Console</button>
    <button id="btn-compile">▶ Compile</button>
  </div>
</header>

<div class="layout">
  <div class="editors">
    <div class="pane">
      <div class="pane-header"><span class="lang-badge">silicon</span> Source</div>
      <div id="editor"></div>
    </div>
    <div class="pane">
      <div class="pane-header"><span class="lang-badge">wat</span> Output</div>
      <div id="wat-output"><span style="color:var(--border);font-style:italic">Click ▶ Compile to see output</span></div>
    </div>
  </div>

  <div class="bottom">
    <div id="error-banner"></div>
    <div id="exports-panel"></div>

    <div class="console-header">
      Console
    </div>
    <div id="console">
      <div class="console-empty">No output yet. Compile and call an exported function.</div>
    </div>
  </div>
</div>

<script src="/web-env.js"></script>
<script type="module">
import {
    EditorView, keymap, lineNumbers,
    highlightActiveLine, highlightActiveLineGutter,
} from 'https://esm.sh/@codemirror/view@6'
import { EditorState, Compartment } from 'https://esm.sh/@codemirror/state@6'
import {
    defaultKeymap, history, historyKeymap, indentWithTab,
} from 'https://esm.sh/@codemirror/commands@6'
import {
    StreamLanguage, syntaxHighlighting, HighlightStyle, bracketMatching,
} from 'https://esm.sh/@codemirror/language@6'
import { tags } from 'https://esm.sh/@lezer/highlight@1'

// ── Silicon language (theme-independent tokenizer) ────────────────────────

const silicon = StreamLanguage.define({
    name: 'silicon',
    tokenTable: {
        keyword:  tags.keyword,
        typeName: tags.typeName,
        string:   tags.string,
        number:   tags.number,
        comment:  tags.lineComment,
        fn:       tags.function(tags.name),
        operator: tags.operator,
    },
    token(stream) {
        if (stream.eatSpace()) return null

        // Line comment
        if (stream.peek() === '#') { stream.skipToEnd(); return 'comment' }

        // String literal: 'single-quoted'
        if (stream.peek() === "'") {
            stream.next()
            while (!stream.eol()) { if (stream.next() === "'") break }
            return 'string'
        }

        // @ keywords  (@let, @fn, @export, @local, @extern, @match, ...)
        if (stream.peek() === '@') {
            stream.next()
            stream.match(/^\w+/)
            return 'keyword'
        }

        // & function / namespace call  (&web::foo, &bar)
        if (stream.peek() === '&') {
            stream.next()
            stream.match(/^\w+(?:::\w+)*/)
            return 'fn'
        }

        // Float before int
        if (stream.match(/^\d+\.\d*/)) return 'number'
        if (stream.match(/^\d+/))      return 'number'

        // Type names
        if (stream.match(/^(?:Int|Float|Bool|String)\b/)) return 'typeName'

        // Identifiers (plain names — inherit default text color)
        if (stream.match(/^[a-zA-Z_]\w*/)) return null

        // Multi-char operators
        if (stream.match(/^(?::=|\+\+|->|=>|::)/)) return 'operator'

        // Single-char operators / punctuation
        if (stream.match(/^[+\-*\/|<>=!,;:.()[\]{}]/)) return 'operator'

        stream.next()
        return null
    },
    languageData: { commentTokens: { line: '#' } },
})

// ── Themes ────────────────────────────────────────────────────────────────

function makeTheme(e, syntax) {
    return [
        EditorView.theme({
            '&': { backgroundColor: e.bg, color: e.text },
            '.cm-content': { caretColor: e.cursor, lineHeight: '1.6', padding: '14px 0' },
            '.cm-line': { paddingLeft: '16px', paddingRight: '16px' },
            '.cm-gutters': { backgroundColor: e.gutterBg, color: e.gutterText, borderRight: `1px solid ${e.gutterBorder}` },
            '.cm-lineNumbers .cm-gutterElement': { paddingRight: '12px', paddingLeft: '8px', minWidth: '40px' },
            '.cm-activeLineGutter': { backgroundColor: e.gutterActiveBg, color: e.gutterActiveText },
            '.cm-activeLine': { backgroundColor: e.activeLine },
            '.cm-cursor, .cm-dropCursor': { borderLeftColor: e.cursor },
            '.cm-selectionBackground': { backgroundColor: e.selection },
            '&.cm-focused .cm-selectionBackground': { backgroundColor: e.selection },
            '.cm-matchingBracket': { outline: `1px solid ${e.cursor}`, borderRadius: '2px' },
            '.cm-nonmatchingBracket': { outline: `1px solid ${e.errorColor}`, borderRadius: '2px' },
        }),
        syntaxHighlighting(HighlightStyle.define(syntax)),
    ]
}

const THEMES = {
    'sigil-dark': {
        label: 'Sigil Dark',
        cssVars: {
            '--bg': '#0d1117', '--surface': '#161b22', '--surface2': '#21262d',
            '--border': '#30363d', '--text': '#e6edf3', '--muted': '#8b949e',
            '--accent': '#a371f7', '--accent2': '#7c3aed',
            '--blue': '#58a6ff', '--green': '#3fb950', '--red': '#f85149', '--yellow': '#d29922',
            '--error-bg': '#2d1117',
            '--wat-kw': '#ff7b72', '--wat-fn': '#58a6ff', '--wat-num': '#79c0ff', '--wat-comment': '#484f58',
        },
        cmExtensions: makeTheme(
            { bg: '#0d1117', text: '#e6edf3', cursor: '#a371f7', activeLine: 'rgba(255,255,255,0.04)',
              selection: 'rgba(61,90,126,0.5)', gutterBg: '#161b22', gutterText: '#8b949e',
              gutterBorder: '#30363d', gutterActiveBg: '#21262d', gutterActiveText: '#e6edf3',
              errorColor: '#f85149' },
            [
                { tag: tags.keyword,             color: '#a371f7' },
                { tag: tags.lineComment,         color: '#484f58', fontStyle: 'italic' },
                { tag: tags.string,              color: '#3fb950' },
                { tag: tags.number,              color: '#79c0ff' },
                { tag: tags.typeName,            color: '#58a6ff' },
                { tag: tags.function(tags.name), color: '#d2a8ff' },
                { tag: tags.operator,            color: '#ff7b72' },
            ]
        ),
    },
    'vscode-dark': {
        label: 'VSCode Dark',
        cssVars: {
            '--bg': '#1e1e1e', '--surface': '#252526', '--surface2': '#2d2d2d',
            '--border': '#3c3c3c', '--text': '#d4d4d4', '--muted': '#808080',
            '--accent': '#569cd6', '--accent2': '#264f78',
            '--blue': '#569cd6', '--green': '#4ec9b0', '--red': '#f44747', '--yellow': '#dcdcaa',
            '--error-bg': '#2d1b1b',
            '--wat-kw': '#569cd6', '--wat-fn': '#dcdcaa', '--wat-num': '#b5cea8', '--wat-comment': '#6a9955',
        },
        cmExtensions: makeTheme(
            { bg: '#1e1e1e', text: '#d4d4d4', cursor: '#aeafad', activeLine: 'rgba(255,255,255,0.04)',
              selection: 'rgba(38,79,120,0.6)', gutterBg: '#1e1e1e', gutterText: '#858585',
              gutterBorder: '#3c3c3c', gutterActiveBg: '#2a2d2e', gutterActiveText: '#c6c6c6',
              errorColor: '#f44747' },
            [
                { tag: tags.keyword,             color: '#c586c0' },
                { tag: tags.lineComment,         color: '#6a9955', fontStyle: 'italic' },
                { tag: tags.string,              color: '#ce9178' },
                { tag: tags.number,              color: '#b5cea8' },
                { tag: tags.typeName,            color: '#4ec9b0' },
                { tag: tags.function(tags.name), color: '#dcdcaa' },
                { tag: tags.operator,            color: '#d4d4d4' },
            ]
        ),
    },
    'github-light': {
        label: 'GitHub Light',
        cssVars: {
            '--bg': '#ffffff', '--surface': '#f6f8fa', '--surface2': '#eaeef2',
            '--border': '#d0d7de', '--text': '#24292f', '--muted': '#57606a',
            '--accent': '#8250df', '--accent2': '#6639ba',
            '--blue': '#0969da', '--green': '#1a7f37', '--red': '#cf222e', '--yellow': '#9a6700',
            '--error-bg': '#fff2f0',
            '--wat-kw': '#cf222e', '--wat-fn': '#0969da', '--wat-num': '#0550ae', '--wat-comment': '#6e7781',
        },
        cmExtensions: makeTheme(
            { bg: '#ffffff', text: '#24292f', cursor: '#8250df', activeLine: 'rgba(0,0,0,0.04)',
              selection: 'rgba(130,80,223,0.15)', gutterBg: '#f6f8fa', gutterText: '#57606a',
              gutterBorder: '#d0d7de', gutterActiveBg: '#eaeef2', gutterActiveText: '#24292f',
              errorColor: '#cf222e' },
            [
                { tag: tags.keyword,             color: '#cf222e' },
                { tag: tags.lineComment,         color: '#6e7781', fontStyle: 'italic' },
                { tag: tags.string,              color: '#0a3069' },
                { tag: tags.number,              color: '#0550ae' },
                { tag: tags.typeName,            color: '#953800' },
                { tag: tags.function(tags.name), color: '#8250df' },
                { tag: tags.operator,            color: '#24292f' },
            ]
        ),
    },
}

const themeCompartment = new Compartment()

// ── Editor setup ───────────────────────────────────────────────────────────

const INITIAL_SOURCE = `# Modules are auto-resolved from their namespace prefix.
# web:: maps to the built-in web environment module.

@fn greet msg:String := {
    @local result := ('Hello, ' ++ msg);
    &web::console_log_str result;
    result
};

@fn hypotenuse a:Float, b:Float := {
    &web::math_sqrt ((&web::math_pow a, 2.0) + (&web::math_pow b, 2.0))
};

@fn roll := {
    &web::math_random
};

@export greet;
@export hypotenuse;
@export roll;`

const editorView = new EditorView({
    state: EditorState.create({
        doc: INITIAL_SOURCE,
        extensions: [
            history(),
            lineNumbers(),
            highlightActiveLine(),
            highlightActiveLineGutter(),
            bracketMatching(),
            keymap.of([
                ...defaultKeymap,
                ...historyKeymap,
                indentWithTab,
                { key: 'Ctrl-Enter', mac: 'Cmd-Enter', run: () => { compile(); return true } },
            ]),
            silicon,
            themeCompartment.of(THEMES['sigil-dark'].cmExtensions),
        ],
    }),
    parent: document.getElementById('editor'),
})

// ── Example programs ──────────────────────────────────────────────────────

const EXAMPLES = {
    empty: '',

    hello_world:
`# Concatenate a greeting string and print it to the console.
# Call greet("World") in the exports panel below.

@fn greet msg:String := {
    @local result := ('Hello, ' ++ msg);
    &web::console_log_str result;
    result
};

@export greet;`,

    hypotenuse:
`# Pythagorean theorem using web math APIs.
# c = sqrt(a² + b²)

@fn hypotenuse a:Float, b:Float := {
    &web::math_sqrt ((&web::math_pow a, 2.0) + (&web::math_pow b, 2.0))
};

@fn roll := { &web::math_random };

@export hypotenuse;
@export roll;`,

    fibonacci:
`# Recursive Fibonacci sequence.
# Try: fib(10) = 55, fib(20) = 6765

@fn fib n:Int := {
    &@if n <= 1, { &@return n };
    (&fib (n - 1)) + (&fib (n - 2))
};

@export fib;`,

    factorial:
`# Recursive factorial.
# Try: factorial(10) = 3628800

@fn factorial n:Int := {
    &@if n <= 1, { &@return 1 };
    n * (&factorial (n - 1))
};

@export factorial;`,

    safe_divide:
`# Integer division guarded against divide-by-zero.
# Returns 0 when y = 0.

@fn safeDivide x:Int, y:Int := {
    &@if y == 0, { &@return 0 };
    x / y
};

@export safeDivide;`,

    countdown:
`# Count iterations using a mutable loop variable.
# Returns the final counter value (should equal n).

@fn countTo n:Int := {
    @var i:Int := 0;
    &@loop i < n, { i = i + 1; };
    i
};

@export countTo;`,

    color_match:
`# Algebraic sum type with exhaustive pattern matching.

@type_sum Color := Red | Green | Blue;

@fn colorCode c:Color := {
    &@match c,
        Color::Red,   { 1 },
        Color::Green, { 2 },
        { 3 }
};

@export colorCode;`,

    bitwise:
`# Bitwise operations on integers.

@fn mask   a:Int, b:Int := { a | b };
@fn toggle a:Int, b:Int := { a ^ b };
@fn doubled a:Int := { a << 1 };
@fn halved  a:Int := { a >> 1 };

@export mask;
@export toggle;
@export doubled;
@export halved;`,

    math_sampler:
`# Web math API sampler — trig, log, and random.

@fn roll    := { &web::math_random };
@fn sinWave x:Float := { &web::math_sin x };
@fn cosWave x:Float := { &web::math_cos x };
@fn logNat  x:Float := { &web::math_log x };

@export roll;
@export sinWave;
@export cosWave;
@export logNat;`,
}

document.getElementById('example-select').addEventListener('change', e => {
    const src = EXAMPLES[e.target.value] ?? ''
    editorView.dispatch({
        changes: { from: 0, to: editorView.state.doc.length, insert: src },
    })
    e.target.value = ''  // reset so the same example can be reloaded
})

// ── Theme switching ───────────────────────────────────────────────────────

function applyTheme(key) {
    const theme = THEMES[key]
    if (!theme) return
    for (const [k, v] of Object.entries(theme.cssVars)) {
        document.documentElement.style.setProperty(k, v)
    }
    editorView.dispatch({ effects: themeCompartment.reconfigure(theme.cmExtensions) })
}

document.getElementById('theme-select').addEventListener('change', e => {
    applyTheme(e.target.value)
})

// ── State ──────────────────────────────────────────────────────────────────
let wasmInstance = null
let wasmExports = []
let printBuffer = []
let webEnv = null

// ── DOM refs ──────────────────────────────────────────────────────────────
const btnCompile      = document.getElementById('btn-compile')
const btnClearConsole = document.getElementById('btn-clear-console')
const statusDot       = document.getElementById('status-dot')
const watOutput       = document.getElementById('wat-output')
const exportsPanel    = document.getElementById('exports-panel')
const errorBanner     = document.getElementById('error-banner')
const consoleEl       = document.getElementById('console')

// ── Utilities ─────────────────────────────────────────────────────────────
function setStatus(state) {
  statusDot.className = 'status-dot' + (state !== 'idle' ? ' ' + state : '')
}

function showError(msg) {
  errorBanner.textContent = msg
  errorBanner.style.display = 'block'
  setStatus('err')
}
function clearError() {
  errorBanner.style.display = 'none'
  errorBanner.textContent = ''
}

function log(msg, type = 'info') {
  const wasEmpty = consoleEl.querySelector('.console-empty')
  if (wasEmpty) wasEmpty.remove()

  const line = document.createElement('div')
  line.className = `console-line ${type}`

  const prefix = document.createElement('span')
  prefix.className = 'prefix'
  prefix.textContent = type === 'print' ? '📤' : type === 'err' ? '✖' : type === 'result' ? '=' : '›'

  const msgEl = document.createElement('span')
  msgEl.className = 'msg'
  msgEl.textContent = msg

  line.append(prefix, msgEl)
  consoleEl.appendChild(line)
  consoleEl.scrollTop = consoleEl.scrollHeight
}

// ── WAT syntax highlighting (lightweight) ─────────────────────────────────
function highlightWat(text) {
  const escaped = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')

  return escaped
    .replace(/^(;;.*)$/gm, '<span class="comment">$1</span>')
    .replace(/\b(func|module|import|export|memory|global|param|result|local|mut)\b/g, '<span class="kw">$1</span>')
    .replace(/\b(i32|f32|i64|f64|void)\b/g, '<span class="num">$1</span>')
    .replace(/\$[\w.]+/g, '<span class="fn">$&</span>')
    .replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="num">$1</span>')
}

// ── Compile ────────────────────────────────────────────────────────────────
btnCompile.addEventListener('click', compile)

async function compile() {
  clearError()
  wasmInstance = null
  exportsPanel.innerHTML = ''
  btnCompile.disabled = true
  setStatus('busy')
  watOutput.innerHTML = '<span style="color:var(--muted);font-style:italic">Compiling…</span>'

  const source = editorView.state.doc.toString()

  let data
  try {
    const res = await fetch('/compile', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source }),
    })
    data = await res.json()
  } catch (e) {
    showError('Network error: ' + e.message)
    watOutput.innerHTML = ''
    btnCompile.disabled = false
    return
  }

  btnCompile.disabled = false

  if (!data.success) {
    showError(data.error ?? 'Unknown error')
    watOutput.innerHTML = ''
    return
  }

  watOutput.innerHTML = highlightWat(data.wat)

  printBuffer = []
  webEnv = createWebEnv({
    onPrint: (msg, type) => {
      printBuffer.push(msg)
      log(msg, type ?? 'print')
    },
  })
  try {
    const wasmBytes = Uint8Array.from(atob(data.wasm), c => c.charCodeAt(0))
    const { instance } = await WebAssembly.instantiate(wasmBytes, webEnv.imports)
    webEnv.bindInstance(instance)
    wasmInstance = instance
    wasmExports = data.exports ?? []
    renderExports(wasmExports, instance)
    setStatus('ok')
    log(`Compiled OK — ${wasmExports.length} export(s) ready`, 'info')
  } catch (e) {
    showError('WASM instantiation failed: ' + e.message)
    setStatus('err')
  }
}

// ── Exports panel ─────────────────────────────────────────────────────────
function renderExports(exports, instance) {
  exportsPanel.innerHTML = ''
  if (exports.length === 0) return

  const label = document.createElement('div')
  label.className = 'exports-label'
  label.textContent = 'Exported Functions'
  exportsPanel.appendChild(label)

  for (const exp of exports) {
    const row = document.createElement('div')
    row.className = 'export-row'

    const sig = document.createElement('span')
    sig.className = 'fn-sig'
    const paramStr = exp.params.map(p => `${p.name}: ${p.type}`).join(', ')
    sig.textContent = `${exp.name}(${paramStr}) → ${exp.result}`
    row.appendChild(sig)

    const paramWrap = document.createElement('div')
    paramWrap.className = 'param-wrap'
    const inputs = []
    for (const param of exp.params) {
      const field = document.createElement('div')
      field.className = 'param-field'

      const lbl = document.createElement('span')
      lbl.className = 'param-label'
      lbl.textContent = `${param.name}: ${param.type}`

      const inp = document.createElement('input')
      inp.type = 'text'
      inp.placeholder = param.type === 'String' ? 'enter a string…'
                      : param.wasmType === 'f32' ? '0.0' : '0'
      inp.className = 'param-input'
      if (param.type === 'String') inp.style.width = '160px'
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') callBtn.click() })

      field.append(lbl, inp)
      paramWrap.appendChild(field)
      inputs.push({ inp, wasmType: param.wasmType, name: param.name, siliconType: param.type })
    }
    row.appendChild(paramWrap)

    const resultSpan = document.createElement('span')
    resultSpan.className = 'call-result'

    const callBtn = document.createElement('button')
    callBtn.className = 'btn-call'
    callBtn.textContent = '▶ Call'
    callBtn.addEventListener('click', () => {
      if (!wasmInstance) { log('No compiled module — hit Compile first', 'err'); return }
      callExport(exp, inputs, resultSpan)
    })

    row.append(callBtn, resultSpan)
    exportsPanel.appendChild(row)
  }
}

function callExport(exp, inputs, resultSpan) {
  const args = inputs.map(({ inp, wasmType, siliconType, name }) => {
    const raw = inp.value
    if (siliconType === 'String') {
      return webEnv ? webEnv.writeString(raw) : 0
    }
    const trimmed = raw.trim()
    if (trimmed === '') { log(`${name} is empty`, 'err'); return NaN }
    return wasmType === 'f32' ? parseFloat(trimmed) : parseInt(trimmed, 10)
  })

  if (args.some(Number.isNaN)) return

  try {
    const fn = wasmInstance.exports[exp.name]
    if (typeof fn !== 'function') { log(`${exp.name} is not a function export`, 'err'); return }

    printBuffer = []
    const raw = fn(...args)
    if (webEnv) webEnv.flush()

    const argStr = inputs.map(({ inp, siliconType }) =>
      siliconType === 'String' ? `"${inp.value}"` : inp.value.trim()
    ).join(', ')
    const ret = exp.wasmResult === 'void' ? '(void)' : formatResult(raw, exp.wasmResult, exp.result)
    resultSpan.textContent = '→ ' + ret
    log(`${exp.name}(${argStr}) = ${ret}`, 'result')
  } catch (e) {
    log(`${exp.name} threw: ${e.message}`, 'err')
    resultSpan.textContent = ''
  }
}

function formatResult(value, wasmType, siliconResult) {
  if (siliconResult === 'String' && webEnv) {
    return '"' + webEnv.readString(value) + '"'
  }
  if (wasmType === 'f32') {
    return Number(value.toPrecision(6)).toString()
  }
  return String(value)
}

// ── Clear console ──────────────────────────────────────────────────────────
btnClearConsole.addEventListener('click', () => {
  consoleEl.innerHTML = '<div class="console-empty">Console cleared.</div>'
  document.querySelectorAll('.call-result').forEach(el => el.textContent = '')
})
</script>
