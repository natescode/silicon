[package]
name      = "modules_demo"
version   = "0.1.0"
entry     = "src/main.si"
namespace = "local"

# A multi-module component (ADR-0024):
#   src/*.si          -> ROOT module (callable unqualified)
#   src/math/*.si     -> module `math`  (call as `math::name`)
#   src/text/*.si     -> module `text`  (call as `text::name`)
# Only `@pub` members cross the module boundary; sibling files in a module are
# auto-included (no `@use`).

[dependencies]
